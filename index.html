<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&family=Open+Sans:ital,wght@0,300..800;1,300..800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
    <title>Job Application Tracker</title>
</head>
<body>
    <div class="ribbon">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24">
	    <path fill="currentColor" d="M5 20v-2h14v2zm0-3.5L3.725 8.475q-.05 0-.113.013T3.5 8.5q-.625 0-1.062-.438T2 7t.438-1.062T3.5 5.5t1.063.438T5 7q0 .175-.038.325t-.087.275L8 9l3.125-4.275q-.275-.2-.45-.525t-.175-.7q0-.625.438-1.063T12 2t1.063.438T13.5 3.5q0 .375-.175.7t-.45.525L16 9l3.125-1.4q-.05-.125-.088-.275T19 7q0-.625.438-1.063T20.5 5.5t1.063.438T22 7t-.437 1.063T20.5 8.5q-.05 0-.112-.012t-.113-.013L19 16.5zm1.7-2h10.6l.65-4.175l-2.625 1.15L12 6.9l-3.325 4.575l-2.625-1.15zm5.3 0" />
        </svg>
        <p>Elenir Studios</p>
        <p>hello@example.com</p>
    </div>
    <div class="global-container">
        <main>
            <div class="tabs">
                <div role="tablist">
                    <button role="tab" aria-selected="true" id="open-roles">Open Roles</button>
                    <button role="tab" aria-selected="false" id="applied">Applied</button>
                </div>

                <div role="tabpanel" aria-labelledby="open-roles">
                    <div class="card">
                        <div class="job-description">
                            <div class="icon"></div>
                            <p>Goldstar Pte. Ltd.</p>
                            <p>Front End Web Developer</p>
                            <p>Central</p>
                            <p>Full time</p>
                        </div>
                        <div class="job-salary">
                            <p>$5000 to $8000</p>
                        </div>
                        <button class="view-details">View Details</button>
                    </div>
                    <div class="card">
                        <div class="job-description">
                            <div class="icon"></div>
                            <p>Horizon Trading Ltd.</p>
                            <p>Junior Front End Web Developer</p>
                            <p>North</p>
                            <p>Full time</p>
                        </div>
                        <div class="job-salary">
                            <p>$3000 to $3500</p>
                        </div>
                        <button class="view-details">View Details</button>
                    </div>
                </div>
                <div role="tabpanel" aria-labelledby="applied" hidden>

                </div>
            </div>
        </main>
    </div>

    <div class="modal-container">
        <dialog class="modal">
        </dialog>
    </div>
    
    <script src="/js/app.js"></script>
</body>
</html>
