<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&family=Open+Sans:ital,wght@0,300..800;1,300..800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
    <title>Job Application Tracker</title>
</head>
<body>
    <div class="global-container">
        <main>
            <div class="tabs">
                <div role="tablist">
                    <div role="button" aria-selected="true" id="open-roles">Open Roles</div>
                </div>
                    <div role="button" aria-selected="false" id="applied">Applied</div>
                </div>
                <div role="tab-panel" aria-labelledby="open-roles">
                    <div class="card-1">
                        <div class="job-description">
                            <div class="icon"></div>
                            <p>Goldstar Pte. Ltd.</p>
                            <p>Front End Web Developer</p>
                            <p>Central</p>
                            <p>Full time</p>
                        </div>
                        <div class="job-salary">
                            <p>$5000 to $8000</p>
                        </div>
                    </div>
                    <div class="card-2">
                        <div class="job-description">
                            <div class="icon"></div>
                            <p>Horizon Trading Ltd.</p>
                            <p>Junior Front End Web Developer</p>
                            <p>North</p>
                            <p>Full time</p>
                        </div>
                        <div class="job-salary">
                            <p>$3000 to $3500</p>
                        </div>
                    </div>
                </div>
                <div role="tab-panel" aria-labelledby="applied" hidden>

                </div>
            </div>
        </main>
    </div>
    
    <div class="modal-container">
        <dialog class="modal">
        </dialog>
    </div>
    
    <script src="/js/app.js"></script>
</body>
</html>
